<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <!-- CodeChef: chef hat with code brackets on black -->
  <rect width="50" height="50" rx="10" fill="#1a1a1a"/>
  <!-- Chef hat body -->
  <rect x="16" y="18" width="18" height="10" rx="1" fill="white"/>
  <!-- Hat top puff -->
  <ellipse cx="25" cy="16" rx="8" ry="7" fill="white"/>
  <!-- Hat brim -->
  <rect x="14" y="26" width="22" height="3" rx="1" fill="white"/>
  <!-- Left code bracket < -->
  <path d="M 14 35 L 9 38.5 L 14 42" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right code bracket > -->
  <path d="M 36 35 L 41 38.5 L 36 42" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Mustache (two curls) -->
  <path d="M 21 31 Q 23 29.5 25 31 Q 27 29.5 29 31" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Eyes/face dots on hat -->
  <circle cx="22" cy="22" r="1" fill="#1a1a1a"/>
  <circle cx="28" cy="22" r="1" fill="#1a1a1a"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <!-- Codolio owl logo -->
  <rect width="50" height="50" rx="10" fill="#1a1a2e"/>
  <!-- Owl body -->
  <ellipse cx="25" cy="30" rx="10" ry="11" fill="#c8832a"/>
  <!-- Owl head -->
  <circle cx="25" cy="18" r="9" fill="#c8832a"/>
  <!-- Face plate -->
  <ellipse cx="25" cy="19" rx="6.5" ry="6" fill="#f0d0a0"/>
  <!-- Left eye circle -->
  <circle cx="21.5" cy="17.5" r="4" fill="white"/>
  <!-- Right eye circle -->
  <circle cx="28.5" cy="17.5" r="4" fill="white"/>
  <!-- Glasses bridge -->
  <line x1="25" y1="17.5" x2="25" y2="17.5" stroke="#5a3e28" stroke-width="1.2"/>
  <!-- Left glasses rim -->
  <circle cx="21.5" cy="17.5" r="4" fill="none" stroke="#5a3e28" stroke-width="1.2"/>
  <!-- Right glasses rim -->
  <circle cx="28.5" cy="17.5" r="4" fill="none" stroke="#5a3e28" stroke-width="1.2"/>
  <!-- Pupils -->
  <circle cx="21.5" cy="17.5" r="2.2" fill="#3d2b1f"/>
  <circle cx="28.5" cy="17.5" r="2.2" fill="#3d2b1f"/>
  <!-- Eye shine -->
  <circle cx="22.3" cy="16.7" r="0.8" fill="white"/>
  <circle cx="29.3" cy="16.7" r="0.8" fill="white"/>
  <!-- Beak -->
  <path d="M 23.5 22 L 25 24 L 26.5 22 Z" fill="#e0a020"/>
  <!-- Ears/tufts -->
  <path d="M 17 12 L 19 9 L 21 13 Z" fill="#8B5E3C"/>
  <path d="M 33 12 L 31 9 L 29 13 Z" fill="#8B5E3C"/>
  <!-- Wing lines on body -->
  <path d="M 15 28 Q 20 25 25 28" fill="none" stroke="#a0682a" stroke-width="1.2"/>
  <path d="M 35 28 Q 30 25 25 28" fill="none" stroke="#a0682a" stroke-width="1.2"/>
</svg>
